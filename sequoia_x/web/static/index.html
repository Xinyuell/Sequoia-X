<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sequoia-X WebUI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <div class="brand">Sequoia-X</div>
          <div class="subline">本地选股控制台</div>
        </div>
        <div class="status-strip" aria-live="polite">
          <span class="status-dot" id="dataDot"></span>
          <span id="dataStatus">读取数据状态中</span>
          <span class="status-date" id="latestDate">--</span>
        </div>
      </header>

      <div class="workspace">
        <nav class="tabs" aria-label="主导航">
          <button class="tab active" data-view="dataView">数据</button>
          <button class="tab" data-view="strategyView">策略</button>
          <button class="tab" data-view="resultsView">结果</button>
        </nav>

        <main>
          <section id="dataView" class="view active">
            <div class="section-head">
              <h1>市场数据</h1>
              <div class="button-row">
                <button id="refreshDataBtn" class="secondary">刷新状态</button>
                <button id="syncBtn">增量同步</button>
              </div>
            </div>

            <div class="metric-grid" id="summaryGrid"></div>

            <div class="panel data-update-panel">
              <div>
                <div class="panel-title">本地数据更新</div>
                <div class="description">
                  默认会续跑补齐：已更新到最新的股票自动跳过，中途停止后再次点击会从缺口继续。强制覆盖重拉只建议在修复数据时使用。
                </div>
              </div>
              <label class="field-label" for="backfillStartDate">
                起始日期
                <input id="backfillStartDate" type="date" value="1990-01-01" />
              </label>
              <label class="field-label" for="backfillSource">
                数据源
                <select id="backfillSource">
                  <option value="auto">自动：Baostock 优先，失败时尝试 Tushare</option>
                  <option value="baostock">仅 Baostock</option>
                  <option value="tushare">仅 Tushare</option>
                </select>
              </label>
              <label class="checkbox-row" for="fullRefreshCheckbox">
                <input id="fullRefreshCheckbox" type="checkbox" />
                <span>强制从起始日覆盖重拉（很慢）</span>
              </label>
              <button id="backfillBtn">续跑/补齐全市场历史 K 线</button>
            </div>

            <div class="panel">
              <div class="panel-title">任务状态</div>
              <div id="jobPanel" class="job-panel muted">暂无运行中的任务</div>
            </div>

            <div class="stock-browser">
              <div class="panel stock-list-panel">
                <div class="stock-list-head">
                  <div class="panel-title">本地股票</div>
                  <input id="stockSearch" type="text" placeholder="搜索名称或代码" />
                </div>
                <div class="stock-table-wrap">
                  <table class="stock-table">
                    <thead>
                      <tr>
                        <th>名称</th>
                        <th>代码</th>
                        <th>最新日期</th>
                        <th>收盘</th>
                        <th>样本</th>
                      </tr>
                    </thead>
                    <tbody id="stockRows"></tbody>
                  </table>
                </div>
              </div>

              <div class="panel chart-panel">
                <div class="chart-head">
                  <div>
                    <div class="panel-title" id="chartTitle">K 线</div>
                    <div class="muted" id="chartMeta">--</div>
                  </div>
                  <button id="reloadStocksBtn" class="secondary">刷新股票</button>
                </div>
                <canvas id="stockChart" width="900" height="420"></canvas>
              </div>
            </div>
          </section>

          <section id="strategyView" class="view">
            <div class="section-head">
              <h1>策略运行</h1>
              <button id="runStrategyBtn">运行策略</button>
            </div>

            <div class="strategy-layout">
              <div class="panel">
                <label class="field-label" for="strategySelect">策略</label>
                <select id="strategySelect"></select>
                <p id="strategyDescription" class="description"></p>
              </div>

              <div class="panel">
                <label class="field-label" for="referenceDate">计算参考日期</label>
                <input id="referenceDate" type="date" />
                <p class="description">策略将基于此日期往回计算，留空则使用最新数据</p>
              </div>

              <form id="parameterForm" class="parameter-grid"></form>
            </div>

            <div id="strategyProgress" class="strategy-progress-panel muted" aria-live="polite">暂无运行中的策略</div>
            <div id="strategyMessage" class="message" aria-live="polite"></div>
          </section>

          <section id="resultsView" class="view">
            <div class="section-head">
              <h1>选股结果</h1>
              <div id="resultCount" class="count-pill">0 只</div>
            </div>
            <div id="resultMeta" class="result-meta muted">尚未运行策略</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr id="resultHeadRow">
                    <th>名称</th>
                    <th>代码</th>
                    <th>最新日期</th>
                    <th>收盘价</th>
                    <th>策略</th>
                    <th>指标</th>
                  </tr>
                </thead>
                <tbody id="resultRows"></tbody>
              </table>
            </div>

            <div id="resultDetailHome">
              <div id="resultDetailPanel" class="panel result-detail-panel">
                <div class="result-detail-head">
                  <div>
                    <div class="panel-title" id="resultDetailTitle">股票详情</div>
                    <div class="muted" id="resultDetailMeta">点击上方结果中的股票查看详情</div>
                  </div>
                  <div class="period-tabs" aria-label="K 线周期">
                    <button class="period-tab active" data-result-period="day">日K</button>
                    <button class="period-tab" data-result-period="week">周K</button>
                    <button class="period-tab" data-result-period="month">月K</button>
                    <button class="period-tab" data-result-period="quarter">季K</button>
                    <button class="period-tab" data-result-period="year">年K</button>
                  </div>
                </div>

                <div id="resultMetricGrid" class="detail-stat-grid"></div>

                <div class="result-chart-shell">
                  <div class="chart-head">
                    <div>
                      <div class="panel-title" id="resultKlineTitle">K 线</div>
                      <div class="muted" id="resultKlineMeta">--</div>
                    </div>
                  </div>
                  <canvas id="resultStockChart" width="900" height="460"></canvas>
                  <div class="range-row">
                    <input id="resultRange" type="range" min="0" max="0" value="0" />
                    <span id="resultRangeLabel">--</span>
                  </div>
                </div>

                <div class="quote-table-wrap">
                  <table class="quote-table">
                    <tbody id="resultQuoteRows"></tbody>
                  </table>
                </div>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
